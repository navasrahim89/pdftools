<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Tools</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
               background: #f0f0f0; min-height: 100vh; }
        .app-container { max-width: 500px; margin: 0 auto; background: white; min-height: 100vh;
                         box-shadow: 0 0 20px rgba(0,0,0,0.1); }
        .header { background: #2563eb; color: white; padding: 20px; text-align: center; font-size: 24px;
                  font-weight: bold; position: sticky; top: 0; }
        .nav { display: grid; grid-template-columns: repeat(4, 1fr); background: #1e293b; position: sticky; top: 64px; }
        .nav button { padding: 15px 5px; border: none; background: transparent; color: #94a3b8; 
                     cursor: pointer; font-size: 12px; transition: all 0.2s; }
        .nav button.active { background: #2563eb; color: white; }
        .nav button:hover { color: white; }
        .content { padding: 20px; }
        .section { display: none; }
        .section.active { display: block; }
        h2 { margin-bottom: 20px; color: #1e293b; border-bottom: 2px solid #2563eb; padding-bottom: 10px; }
        .file-box { border: 2px dashed #94a3b8; padding: 30px; text-align: center; border-radius: 12px;
                   cursor: pointer; margin-bottom: 15px; transition: all 0.2s; background: #f8fafc; }
        .file-box:hover { border-color: #2563eb; background: #eff6ff; }
        .file-box.has-file { border-color: #22c55e; background: #f0fdf4; }
        .file-name { font-size: 14px; color: #22c55e; margin-top: 10px; word-break: break-all; }
        input[type="file"] { display: none; }
        input[type="number"], input[type="text"] { width: 100%; padding: 14px; margin: 10px 0;
                                                   border: 1px solid #cbd5e1; border-radius: 8px; font-size: 16px; }
        .btn { display: block; width: 100%; padding: 16px; background: #2563eb; color: white; 
               border: none; border-radius: 8px; font-size: 16px; cursor: pointer; margin: 10px 0;
               transition: background 0.2s; }
        .btn:hover { background: #1d4ed8; }
        .btn:disabled { background: #94a3b8; cursor: not-allowed; }
        .btn.green { background: #22c55e; }
        .btn.green:hover { background: #16a34a; }
        .btn.orange { background: #f97316; }
        .btn.orange:hover { background: #ea580c; }
        .btn.gray { background: #64748b; }
        .btn.gray:hover { background: #475569; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; margin: 10px 0; }
        .file-list { margin: 15px 0; max-height: 200px; overflow-y: auto; }
        .file-item { padding: 12px; background: #f1f5f9; margin: 8px 0; border-radius: 6px;
                     display: flex; justify-content: space-between; align-items: center; }
        .file-item .name { flex: 1; overflow: hidden; text-overflow: ellipsis; white-space: nowrap;
                          font-size: 14px; }
        .file-item .remove { color: #ef4444; cursor: pointer; padding: 5px 10px; font-weight: bold; }
        .status { padding: 15px; margin: 15px 0; border-radius: 8px; display: none; }
        .status.show { display: block; }
        .status.success { background: #dcfce7; color: #166534; }
        .status.error { background: #fee2e2; color: #991b1b; }
        .status.loading { background: #dbeafe; color: #1e40af; }
        .info { font-size: 13px; color: #64748b; margin-top: 10px; }
        .loading-spinner { display: inline-block; width: 20px; height: 20px; border: 3px solid #ffffff;
                         border-top-color: transparent; border-radius: 50%; animation: spin 1s linear infinite;
                         vertical-align: middle; margin-right: 10px; }
        @keyframes spin { to { transform: rotate(360deg); } }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">PDF Tools</div>
        <div class="nav">
            <button class="active" data-tab="merge">Merge</button>
            <button data-tab="split">Split</button>
            <button data-tab="scanner">Scanner</button>
            <button data-tab="resize">Resize</button>
        </div>
        
        <div class="content">
            <!-- MERGE -->
            <div id="merge" class="section active">
                <h2>PDF Merge</h2>
                <div class="file-box" onclick="document.getElementById('mergeFiles').click()">
                    <div>Tap to select PDF files</div>
                    <div class="info">Select multiple files</div>
                </div>
                <input type="file" id="mergeFiles" multiple accept=".pdf">
                <div class="file-list" id="mergeList"></div>
                <button class="btn green" onclick="mergePDFs()">Merge PDFs</button>
                <div class="status" id="mergeStatus"></div>
            </div>
            
            <!-- SPLIT -->
            <div id="split" class="section">
                <h2>PDF Split</h2>
                <div class="file-box" id="splitBox" onclick="document.getElementById('splitFile').click()">
                    <div>Tap to select PDF</div>
                </div>
                <input type="file" id="splitFile" accept=".pdf">
                <div class="file-name" id="splitName"></div>
                <input type="text" id="pageRange" placeholder="e.g., 1-3,5,7-10 (leave empty for all)">
                <button class="btn" onclick="splitPDF()">Split PDF</button>
                <button class="btn gray" onclick="splitAllPages()">Split All Pages</button>
                <div class="status" id="splitStatus"></div>
            </div>
            
            <!-- SCANNER -->
            <div id="scanner" class="section">
                <h2>PDF Scanner</h2>
                <div class="file-box" id="scanBox" onclick="document.getElementById('scanFile').click()">
                    <div>Tap to select image</div>
                </div>
                <input type="file" id="scanFile" accept="image/*">
                <div class="file-name" id="scanName"></div>
                <div class="grid-2">
                    <button class="btn gray" onclick="processScan('grayscale')">Grayscale</button>
                    <button class="btn gray" onclick="processScan('blackwhite')">B&W</button>
                    <button class="btn gray" onclick="processScan('enhance')">Enhance</button>
                    <button class="btn gray" onclick="processScan('denoise')">Denoise</button>
                </div>
                <button class="btn green" onclick="convertToPDF()">Convert to PDF</button>
                <div class="status" id="scanStatus"></div>
            </div>
            
            <!-- RESIZE -->
            <div id="resize" class="section">
                <h2>Resize</h2>
                <div class="file-box" id="resizeBox" onclick="document.getElementById('resizeFile').click()">
                    <div>Tap to select file (PDF or Image)</div>
                </div>
                <input type="file" id="resizeFile" accept=".pdf,.jpg,.jpeg,.png,.png">
                <div class="file-name" id="resizeName"></div>
                <input type="number" id="scalePercent" value="100" placeholder="Scale % (e.g., 50)">
                <button class="btn orange" onclick="resizeFile()">Resize</button>
                <div class="status" id="resizeStatus"></div>
            </div>
        </div>
    </div>
    
    <script>
        const JSZip = null;
        let mergeFilesList = [];
        let splitPdfData = null;
        let scanImgData = null;
        let resizeFileData = null;
        let resizeFileType = null;

        // Tab Navigation
        document.querySelectorAll('.nav button').forEach(btn => {
            btn.addEventListener('click', () => {
                document.querySelectorAll('.nav button').forEach(b => b.classList.remove('active'));
                document.querySelectorAll('.section').forEach(s => s.classList.remove('active'));
                btn.classList.add('active');
                document.getElementById(btn.dataset.tab).classList.add('active');
            });
        });

        // File input handlers
        document.getElementById('mergeFiles').addEventListener('change', (e) => {
            mergeFilesList = Array.from(e.target.files);
            updateMergeList();
        });

        document.getElementById('splitFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                const buffer = await file.arrayBuffer();
                splitPdfData = { buffer, name: file.name };
                document.getElementById('splitBox').classList.add('has-file');
                document.getElementById('splitName').textContent = file.name;
            }
        });

        document.getElementById('scanFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                const buffer = await file.arrayBuffer();
                scanImgData = { buffer, name: file.name };
                document.getElementById('scanBox').classList.add('has-file');
                document.getElementById('scanName').textContent = file.name;
            }
        });

        document.getElementById('resizeFile').addEventListener('change', async (e) => {
            const file = e.target.files[0];
            if (file) {
                const buffer = await file.arrayBuffer();
                resizeFileData = { buffer, name: file.name };
                resizeFileType = file.type;
                document.getElementById('resizeBox').classList.add('has-file');
                document.getElementById('resizeName').textContent = file.name;
            }
        });

        function updateMergeList() {
            const list = document.getElementById('mergeList');
            if (mergeFilesList.length === 0) {
                list.innerHTML = '';
                return;
            }
            list.innerHTML = mergeFilesList.map((f, i) => 
                `<div class="file-item"><span class="name">${f.name}</span><span class="remove" onclick="removeMerge(${i})">✕</span></div>`
            ).join('');
        }

        function removeMerge(i) {
            mergeFilesList.splice(i, 1);
            updateMergeList();
        }

        // PDF Merge using pdf-lib
        async function mergePDFs() {
            if (mergeFilesList.length < 2) {
                showStatus('mergeStatus', 'Select at least 2 PDFs', 'error');
                return;
            }
            showStatus('mergeStatus', 'Processing...', 'loading');
            
            try {
                const { PDFDocument } = await import('https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js');
                const mergedPdf = await PDFDocument.create();
                
                for (const file of mergeFilesList) {
                    const arrayBuffer = await file.arrayBuffer();
                    const pdf = await PDFDocument.load(arrayBuffer);
                    const copiedPages = await mergedPdf.copyPages(pdf, pdf.getPageIndices());
                    copiedPages.forEach(page => mergedPdf.addPage(page));
                }
                
                const pdfBytes = await mergedPdf.save();
                downloadFile(pdfBytes, `merged_${Date.now()}.pdf`, 'application/pdf');
                showStatus('mergeStatus', 'PDF merged successfully!', 'success');
            } catch (e) {
                showStatus('mergeStatus', 'Error: ' + e.message, 'error');
            }
        }

        // PDF Split
        async function splitPDF() {
            if (!splitPdfData) {
                showStatus('splitStatus', 'Select a PDF first', 'error');
                return;
            }
            showStatus('splitStatus', 'Processing...', 'loading');
            
            try {
                const { PDFDocument } = await import('https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js');
                const srcPdf = await PDFDocument.load(splitPdfData.buffer);
                const range = document.getElementById('pageRange').value.trim();
                
                let pages = [];
                if (!range) {
                    showStatus('splitStatus', 'Enter page range or use Split All Pages', 'error');
                    return;
                }
                
                const parts = range.split(',');
                for (const p of parts) {
                    if (p.includes('-')) {
                        const [start, end] = p.split('-').map(n => parseInt(n));
                        for (let i = start; i <= end; i++) pages.push(i - 1);
                    } else {
                        pages.push(parseInt(p) - 1);
                    }
                }
                
                const newPdf = await PDFDocument.create();
                const copiedPages = await newPdf.copyPages(srcPdf, pages.filter(i => i >= 0 && i < srcPdf.getPageCount()));
                copiedPages.forEach(page => newPdf.addPage(page));
                
                const pdfBytes = await newPdf.save();
                downloadFile(pdfBytes, `split_${Date.now()}.pdf`, 'application/pdf');
                showStatus('splitStatus', 'PDF split successfully!', 'success');
            } catch (e) {
                showStatus('splitStatus', 'Error: ' + e.message, 'error');
            }
        }

        async function splitAllPages() {
            if (!splitPdfData) {
                showStatus('splitStatus', 'Select a PDF first', 'error');
                return;
            }
            showStatus('splitStatus', 'Processing...', 'loading');
            
            try {
                const { PDFDocument } = await import('https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js');
                const srcPdf = await PDFDocument.load(splitPdfData.buffer);
                const pageCount = srcPdf.getPageCount();
                
                // For splitting into multiple files, we'll create one PDF with all pages
                // User can use the page range feature for individual pages
                const newPdf = await PDFDocument.create();
                const copiedPages = await newPdf.copyPages(srcPdf, srcPdf.getPageIndices());
                copiedPages.forEach(page => newPdf.addPage(page));
                
                const pdfBytes = await newPdf.save();
                downloadFile(pdfBytes, `split_all_${Date.now()}.pdf`, 'application/pdf');
                showStatus('splitStatus', `Split complete (${pageCount} pages)`, 'success');
            } catch (e) {
                showStatus('splitStatus', 'Error: ' + e.message, 'error');
            }
        }

        // Scanner - Image Processing
        async function processScan(mode) {
            if (!scanImgData) {
                showStatus('scanStatus', 'Select an image first', 'error');
                return;
            }
            showStatus('scanStatus', 'Processing...', 'loading');
            
            try {
                const img = await createImageBitmap(new Blob([scanImgData.buffer]));
                const canvas = document.createElement('canvas');
                const ctx = canvas.getContext('2d');
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                
                const imageData = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageData.data;
                
                if (mode === 'grayscale') {
                    for (let i = 0; i < data.length; i += 4) {
                        const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
                        data[i] = data[i + 1] = data[i + 2] = avg;
                    }
                } else if (mode === 'blackwhite') {
                    for (let i = 0; i < data.length; i += 4) {
                        const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
                        const v = avg > 127 ? 255 : 0;
                        data[i] = data[i + 1] = data[i + 2] = v;
                    }
                } else if (mode === 'enhance') {
                    for (let i = 0; i < data.length; i += 4) {
                        data[i] = Math.min(255, data[i] * 1.2);
                        data[i + 1] = Math.min(255, data[i + 1] * 1.2);
                        data[i + 2] = Math.min(255, data[i + 2] * 1.2);
                    }
                }
                
                ctx.putImageData(imageData, 0, 0);
                canvas.toBlob(blob => {
                    downloadFile(blob, `scanned_${Date.now()}.jpg`, 'image/jpeg');
                    showStatus('scanStatus', 'Image processed!', 'success');
                }, 'image/jpeg', 0.9);
            } catch (e) {
                showStatus('scanStatus', 'Error: ' + e.message, 'error');
            }
        }

        async function convertToPDF() {
            if (!scanImgData) {
                showStatus('scanStatus', 'Select an image first', 'error');
                return;
            }
            showStatus('scanStatus', 'Processing...', 'loading');
            
            try {
                const { PDFDocument } = await import('https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js');
                const img = await createImageBitmap(new Blob([scanImgData.buffer]));
                const canvas = document.createElement('canvas');
                canvas.width = img.width;
                canvas.height = img.height;
                canvas.getContext('2d').drawImage(img, 0, 0);
                
                const pdf = await PDFDocument.create();
                const pdfImage = await pdf.embedJpg(canvas.toDataURL('image/jpeg').split(',')[1]);
                const page = pdf.addPage([img.width, img.height]);
                page.drawImage(pdfImage, { x: 0, y: 0, width: img.width, height: img.height });
                
                const pdfBytes = await pdf.save();
                downloadFile(pdfBytes, `scanned_${Date.now()}.pdf`, 'application/pdf');
                showStatus('scanStatus', 'Converted to PDF!', 'success');
            } catch (e) {
                showStatus('scanStatus', 'Error: ' + e.message, 'error');
            }
        }

        // Resize
        async function resizeFile() {
            if (!resizeFileData) {
                showStatus('resizeStatus', 'Select a file first', 'error');
                return;
            }
            showStatus('resizeStatus', 'Processing...', 'loading');
            
            try {
                const scale = parseInt(document.getElementById('scalePercent').value) || 100;
                const ext = resizeFileData.name.split('.').pop().toLowerCase();
                
                if (ext === 'pdf') {
                    const { PDFDocument } = await import('https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js');
                    const srcPdf = await PDFDocument.load(resizeFileData.buffer);
                    const newPdf = await PDFDocument.create();
                    
                    for (const page of await newPdf.copyPages(srcPdf, srcPdf.getPageIndices())) {
                        const { width, height } = page.getSize();
                        page.setMediaBox(0, 0, width * scale / 100, height * scale / 100);
                        newPdf.addPage(page);
                    }
                    
                    const pdfBytes = await newPdf.save();
                    downloadFile(pdfBytes, `resized_${Date.now()}.pdf`, 'application/pdf');
                } else {
                    const img = await createImageBitmap(new Blob([resizeFileData.buffer]));
                    const canvas = document.createElement('canvas');
                    canvas.width = img.width * scale / 100;
                    canvas.height = img.height * scale / 100;
                    canvas.getContext('2d').drawImage(img, 0, 0, canvas.width, canvas.height);
                    
                    canvas.toBlob(blob => {
                        downloadFile(blob, `resized_${Date.now()}.jpg`, 'image/jpeg');
                        showStatus('resizeStatus', 'File resized!', 'success');
                    }, 'image/jpeg', 0.9);
                }
            } catch (e) {
                showStatus('resizeStatus', 'Error: ' + e.message, 'error');
            }
        }

        function downloadFile(data, filename, mimeType) {
            const blob = new Blob([data], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function showStatus(id, msg, type) {
            const el = document.getElementById(id);
            el.textContent = msg;
            el.className = 'status show ' + type;
            if (type === 'loading') {
                el.innerHTML = '<span class="loading-spinner"></span>' + msg;
            }
        }
    </script>
</body>
</html>
