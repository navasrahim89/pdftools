<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PDF Scanner Pro</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; 
               background: #0f0f0f; min-height: 100vh; color: white; }
        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; display: flex; flex-direction: column; }
        .header { background: #1a1a1a; padding: 20px; text-align: center; font-size: 22px; font-weight: bold;
                  border-bottom: 1px solid #333; display: flex; align-items: center; justify-content: space-between; }
        .header span { color: #4ade80; }
        .preview-box { flex: 1; display: flex; align-items: center; justify-content: center; 
                      background: #000; position: relative; min-height: 400px; }
        .preview-box video, .preview-box canvas { max-width: 100%; max-height: 100%; }
        .preview-box canvas { position: absolute; top: 0; left: 0; }
        .placeholder { color: #666; text-align: center; padding: 20px; }
        .controls { background: #1a1a1a; padding: 20px; border-top: 1px solid #333; }
        .btn { display: block; width: 100%; padding: 18px; border: none; border-radius: 12px; font-size: 18px; 
               cursor: pointer; margin: 10px 0; font-weight: bold; transition: all 0.2s; }
        .btn-camera { background: #4ade80; color: #000; }
        .btn-camera:hover { background: #22c55e; }
        .btn-gallery { background: #3b82f6; color: white; }
        .btn-gallery:hover { background: #2563eb; }
        .btn-process { background: #f59e0b; color: #000; }
        .btn-process:hover { background: #d97706; }
        .btn-pdf { background: #22d3ee; color: #000; }
        .btn-pdf:hover { background: #06b6d4; }
        .btn:disabled { opacity: 0.5; cursor: not-allowed; }
        .status { padding: 15px; margin: 10px 0; border-radius: 8px; text-align: center; display: none; }
        .status.show { display: block; }
        .status.success { background: #166534; color: #86efac; }
        .status.error { background: #991b1b; color: #fca5a5; }
        .status.loading { background: #1e3a8a; color: #93c5fd; }
        .options { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; margin: 10px 0; }
        .option-btn { padding: 12px 5px; background: #333; color: #aaa; border: none; border-radius: 8px; 
                     cursor: pointer; font-size: 12px; transition: all 0.2s; }
        .option-btn.active { background: #4ade80; color: #000; }
        .loading-overlay { position: absolute; top: 0; left: 0; right: 0; bottom: 0; background: rgba(0,0,0,0.8);
                          display: none; align-items: center; justify-content: center; flex-direction: column; z-index: 100; }
        .loading-overlay.show { display: flex; }
        .spinner { width: 60px; height: 60px; border: 4px solid #333; border-top: 4px solid #4ade80;
                   border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { to { transform: rotate(360deg); } }
        .loading-text { margin-top: 20px; color: #4ade80; font-size: 18px; }
        input[type="file"] { display: none; }
    </style>
</head>
<body>
    <div class="app-container">
        <div class="header">
            <span>📷</span> PDF Scanner Pro
            <span style="font-size:12px;color:#666">Auto Edge Detect</span>
        </div>
        
        <div class="preview-box" id="previewBox">
            <div class="placeholder">Tap camera to scan</div>
            <video id="video" autoplay playsinline style="display:none"></video>
            <canvas id="canvas" style="display:none"></canvas>
            <div class="loading-overlay" id="loadingOverlay">
                <div class="spinner"></div>
                <div class="loading-text">Processing...</div>
            </div>
        </div>
        
        <div class="controls">
            <button class="btn btn-camera" id="btnCamera" onclick="startCamera()">📷 Open Camera</button>
            <button class="btn btn-gallery" onclick="document.getElementById('galleryInput').click()">🖼️ From Gallery</button>
            <input type="file" id="galleryInput" accept="image/*" onchange="loadFromGallery(event)">
            
            <div class="options">
                <button class="option-btn active" onclick="setFilter('original')" id="optOriginal">Original</button>
                <button class="option-btn" onclick="setFilter('grayscale')" id="optGrayscale">B&W</button>
                <button class="option-btn" onclick="setFilter('enhanced')" id="optEnhanced">Enhance</button>
                <button class="option-btn" onclick="setFilter('edge')" id="optEdge">Edge Detect</button>
            </div>
            
            <button class="btn btn-process" id="btnProcess" onclick="processImage()" disabled>⚡ Auto Edge Detect & Process</button>
            <button class="btn btn-pdf" id="btnPdf" onclick="convertToPdf()" disabled>📄 Save as PDF</button>
            
            <div class="status" id="status"></div>
        </div>
    </div>

    <script>
        let video = document.getElementById('video');
        let canvas = document.getElementById('canvas');
        let ctx = canvas.getContext('2d');
        let currentFilter = 'original';
        let capturedImage = null;
        let processedImage = null;
        let stream = null;

        async function startCamera() {
            try {
                stream = await navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: 'environment' } 
                });
                video.srcObject = stream;
                video.style.display = 'block';
                document.querySelector('.placeholder').style.display = 'none';
                document.getElementById('btnCamera').textContent = '📷 Camera Active - Tap to Capture';
                document.getElementById('btnCamera').onclick = captureImage;
                showStatus('Camera ready! Tap to capture', 'success');
            } catch (e) {
                showStatus('Camera error: ' + e.message, 'error');
            }
        }

        function captureImage() {
            if (stream) {
                canvas.width = video.videoWidth;
                canvas.height = video.videoHeight;
                ctx.drawImage(video, 0, 0);
                capturedImage = canvas.toDataURL('image/jpeg', 0.9);
                
                // Stop camera
                stream.getTracks().forEach(track => track.stop());
                video.style.display = 'none';
                document.getElementById('btnCamera').textContent = '📷 Retake';
                document.getElementById('btnCamera').onclick = () => location.reload();
                
                document.getElementById('btnProcess').disabled = false;
                document.getElementById('btnPdf').disabled = false;
                
                showImage(capturedImage);
                showStatus('Image captured! Select filter and process', 'success');
            }
        }

        function loadFromGallery(event) {
            const file = event.target.files[0];
            if (file) {
                const reader = new FileReader();
                reader.onload = (e) => {
                    capturedImage = e.target.result;
                    const img = new Image();
                    img.onload = () => {
                        canvas.width = img.width;
                        canvas.height = img.height;
                        ctx.drawImage(img, 0, 0);
                        capturedImage = canvas.toDataURL('image/jpeg', 0.9);
                    };
                    img.src = capturedImage;
                    
                    document.getElementById('btnProcess').disabled = false;
                    document.getElementById('btnPdf').disabled = false;
                    showImage(capturedImage);
                    showStatus('Image loaded! Select filter and process', 'success');
                };
                reader.readAsDataURL(file);
            }
        }

        function setFilter(filter) {
            currentFilter = filter;
            document.querySelectorAll('.option-btn').forEach(btn => btn.classList.remove('active'));
            document.getElementById('opt' + filter.charAt(0).toUpperCase() + filter.slice(1)).classList.add('active');
            
            if (processedImage) {
                applyFilter(filter);
            }
        }

        function applyFilter(filter, imageData = null) {
            const img = new Image();
            img.onload = () => {
                canvas.width = img.width;
                canvas.height = img.height;
                ctx.drawImage(img, 0, 0);
                
                if (filter === 'original') {
                    showStatus('Showing original', 'success');
                    return;
                }
                
                const imageInfo = ctx.getImageData(0, 0, canvas.width, canvas.height);
                const data = imageInfo.data;
                
                if (filter === 'grayscale') {
                    for (let i = 0; i < data.length; i += 4) {
                        const avg = (data[i] + data[i + 1] + data[i + 2]) / 3;
                        const val = avg > 127 ? 255 : 0;
                        data[i] = data[i + 1] = data[i + 2] = val;
                    }
                } else if (filter === 'enhanced') {
                    for (let i = 0; i < data.length; i += 4) {
                        data[i] = Math.min(255, data[i] * 1.3);
                        data[i + 1] = Math.min(255, data[i + 1] * 1.3);
                        data[i + 2] = Math.min(255, data[i + 2] * 1.3);
                    }
                } else if (filter === 'edge') {
                    // Simple edge detection using grayscale
                    const gray = new Uint8ClampedArray(canvas.width * canvas.height);
                    for (let i = 0; i < data.length; i += 4) {
                        gray[i / 4] = (data[i] + data[i + 1] + data[i + 2]) / 3;
                    }
                    
                    const result = ctx.createImageData(canvas.width, canvas.height);
                    for (let y = 1; y < canvas.height - 1; y++) {
                        for (let x = 1; x < canvas.width - 1; x++) {
                            const i = (y * canvas.width + x) * 4;
                            const gx = gray[(y-1)*canvas.width+(x+1)] - gray[(y-1)*canvas.width+(x-1)];
                            const gy = gray[(y+1)*canvas.width+x] - gray[(y-1)*canvas.width+x];
                            const edge = Math.sqrt(gx*gx + gy*gy);
                            const val = edge > 50 ? 255 : 0;
                            result.data[i] = result.data[i+1] = result.data[i+2] = val;
                            result.data[i+3] = 255;
                        }
                    }
                    ctx.putImageData(result, 0, 0);
                }
                
                if (filter !== 'edge') {
                    ctx.putImageData(imageInfo, 0, 0);
                }
                
                processedImage = canvas.toDataURL('image/jpeg', 0.9);
            };
            img.src = imageData || capturedImage;
        }

        async function processImage() {
            showLoading(true);
            
            // Apply current filter
            setTimeout(() => {
                applyFilter(currentFilter);
                showLoading(false);
                showStatus('Processed with ' + currentFilter + ' filter', 'success');
            }, 500);
        }

        function showImage(dataUrl) {
            const img = document.createElement('img');
            img.src = dataUrl;
            img.style.maxWidth = '100%';
            img.style.maxHeight = '100%';
            
            const box = document.getElementById('previewBox');
            box.innerHTML = '';
            box.appendChild(img);
            box.appendChild(document.getElementById('loadingOverlay'));
        }

        async function convertToPdf() {
            showLoading(true);
            showStatus('Converting to PDF...', 'loading');
            
            try {
                const { PDFDocument } = await import('https://unpkg.com/pdf-lib@1.17.1/dist/pdf-lib.min.js');
                
                const imgData = processedImage || capturedImage;
                const img = new Image();
                img.src = imgData;
                await new Promise(resolve => img.onload = resolve);
                
                const tempCanvas = document.createElement('canvas');
                tempCanvas.width = img.width;
                tempCanvas.height = img.height;
                tempCanvas.getContext('2d').drawImage(img, 0, 0);
                
                const jpgData = tempCanvas.toDataURL('image/jpeg').split(',')[1];
                
                const pdf = await PDFDocument.create();
                const jpgImage = await pdf.embedJpg(jpgData);
                const page = pdf.addPage([img.width, img.height]);
                page.drawImage(jpgImage, { x: 0, y: 0, width: img.width, height: img.height });
                
                const pdfBytes = await pdf.save();
                downloadFile(pdfBytes, `scanned_${Date.now()}.pdf`, 'application/pdf');
                
                showStatus('PDF saved!', 'success');
            } catch (e) {
                showStatus('Error: ' + e.message, 'error');
            }
            
            showLoading(false);
        }

        function downloadFile(data, filename, mimeType) {
            const blob = new Blob([data], { type: mimeType });
            const url = URL.createObjectURL(blob);
            const a = document.createElement('a');
            a.href = url;
            a.download = filename;
            a.click();
            URL.revokeObjectURL(url);
        }

        function showStatus(msg, type) {
            const el = document.getElementById('status');
            el.textContent = msg;
            el.className = 'status show ' + type;
        }

        function showLoading(show) {
            document.getElementById('loadingOverlay').classList.toggle('show', show);
        }
    </script>
</body>
</html>
